name: Oracle Instance Retry

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Configure OCI
        env:
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          echo "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=$OCI_USER" >> ~/.oci/config
          echo "fingerprint=$OCI_FINGERPRINT" >> ~/.oci/config
          echo "tenancy=$OCI_TENANCY" >> ~/.oci/config
          echo "region=$OCI_REGION" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config

      - name: Check and create instance
        env:
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          COUNT=$(oci compute instance list \
            --compartment-id $OCI_TENANCY \
            --lifecycle-state RUNNING \
            --query "length(data)" \
            --raw-output 2>/dev/null || echo "0")
          if [ "$COUNT" -gt "0" ]; then
            echo "Instance deja active."
            exit 0
          fi
          oci compute instance launch \
            --compartment-id $OCI_TENANCY \
            --availability-domain gFWC:EU-PARIS-1-AD-1 \
            --shape VM.Standard.A1.Flex \
            --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
            --image-id $OCI_IMAGE_ID \
            --subnet-id $OCI_SUBNET_ID \
            --assign-public-ip true \
            --display-name mon-serveur \
            --metadata "{\"ssh_authorized_keys\": \"$SSH_PUBLIC_KEY\"}" \
          && echo "SUCCES!" \
          || echo "Pas de capacite"
